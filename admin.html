<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Link to the Web App Manifest (Primarily Android/Chrome) -->
<link rel="manifest" href="/manifest.json">

<!-- Meta tags for Apple iOS/Safari PWA Compatibility -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Get Coins">
<link rel="apple-touch-icon" href="Get-Coins.png">
    <title>Admin Panel</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, Helvetica, sans-serif; }
        body { background-color: #6b7280; padding: 12px; }
        .admin-container { width: 100%; max-width: 540px; background-color: #ffffff; border: 1px solid #d1d5db; border-radius: 12px; padding: 16px; margin: 10px auto; }
        .admin-header { width: 100%; margin-bottom: 20px; border-bottom: 1px solid #e5e7eb; padding-bottom: 12px; }
        .header-row { display: flex; justify-content: space-between; align-items: center; }
        .back-link { color: #4b5563; text-decoration: none; font-size: 13px; font-weight: bold; }
        .admin-title { font-size: 18px; font-weight: bold; color: #111827; }
        .btn-logout { background-color: #4b5563; color: white; border: none; padding: 6px 12px; border-radius: 4px; font-size: 13px; font-weight: bold; cursor: pointer; }
        .section-card { background-color: #ffffff; border: 1px solid #d1d5db; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
        .section-title { font-size: 17px; font-weight: bold; color: #111827; margin-bottom: 14px; }
        .input-row { display: flex; flex-direction: column; gap: 12px; margin-bottom: 12px; }
        @media (min-width: 480px) { .input-row { flex-direction: row; } .input-cell { flex: 1; } }
        .input-cell { width: 100%; }
        .duration-triple-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
        label { display: block; font-size: 13px; font-weight: bold; color: #4b5563; margin-bottom: 4px; }
        .form-input, select { width: 100%; padding: 10px; font-size: 15px; border: 1px solid #cbd5e1; border-radius: 6px; outline: none; background-color: #ffffff; }
        .input-wrapper { position: relative; }
        .toggle-password { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #94a3b8; cursor: pointer; }
        .btn-primary { width: 100%; background-color: #ef4444; color: white; border: none; padding: 12px; border-radius: 6px; font-size: 14px; font-weight: bold; cursor: pointer; margin-top: 4px; }
        .list-header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
        .total-counter { font-size: 13px; color: #4b5563; }
        .total-counter strong { color: #ef4444; }
        .btn-danger-all { background-color: #dc2626; color: white; border: none; padding: 8px 12px; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; }
        .search-input { width: 100%; padding: 10px; font-size: 14px; border: 1px solid #cbd5e1; border-radius: 6px; margin-bottom: 14px; }
        .customer-item { border: 1px solid #cbd5e1; border-radius: 6px; padding: 12px; margin-bottom: 12px; background-color: #ffffff; }
        .item-top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .customer-name { font-size: 14px; font-weight: bold; color: #111827; display: flex; align-items: center; }
        .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
        .status-dot.online { background-color: #10b981; }
        .status-dot.offline { background-color: #94a3b8; }
        .status-lbl-text { font-size: 12px; color: #94a3b8; font-weight: normal; margin-left: 4px; }
        .badge-active { font-size: 12px; font-weight: bold; }
        .customer-details { font-size: 13px; color: #475569; line-height: 1.5; margin-bottom: 12px; }
        .highlight-expired { color: #dc2626; font-weight: bold; }
        .actions-container { display: flex; flex-wrap: wrap; gap: 6px; }
        .action-btn { flex: 1 1 auto; text-align: center; border: none; padding: 8px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; color: white; cursor: pointer; }
        .btn-row-del { background-color: #ef4444; }
    </style>
</head>
<body>

    <div class="admin-container">
        <div class="admin-header">
            <div class="header-row">
                <a href="login.html" class="back-link">← Login</a>
                <div class="admin-title">Admin Panel</div>
                <button class="btn-logout" onclick="window.location.href='login.html'">Logout</button>
            </div>
        </div>

        <div class="section-card">
            <div class="section-title">Create New User</div>
            <form id="createUserForm">
                <div class="input-row">
                    <div class="input-cell">
                        <label for="newUsername">Username</label>
                        <input type="text" id="newUsername" class="form-input" required autocomplete="off">
                    </div>
                    <div class="input-cell">
                        <label for="newPassword">Password</label>
                        <div class="input-wrapper">
                            <input type="password" id="newPassword" class="form-input" required>
                            <button type="button" class="toggle-password" id="togglePassBtn">
                                <i data-lucide="eye" style="width:16px;"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="input-row">
                    <div class="input-cell">
                        <label for="durationSelect">Duration</label>
                        <select id="durationSelect">
                            <option value="1">1 day</option>
                            <option value="7">7 days</option>
                            <option value="30">30 days</option>
                            <option value="custom">Custom Configuration</option>
                        </select>
                    </div>
                </div>

                <div class="duration-triple-row">
                    <div>
                        <label for="inputDays">Days</label>
                        <input type="number" id="inputDays" class="form-input" value="1" min="0">
                    </div>
                    <div>
                        <label for="inputHours">Hours</label>
                        <input type="number" id="inputHours" class="form-input" value="0" min="0">
                    </div>
                    <div>
                        <label for="inputMinutes">Minutes</label>
                        <input type="number" id="inputMinutes" class="form-input" value="0" min="0">
                    </div>
                </div>

                <button type="submit" class="btn-primary">Create User</button>
            </form>
        </div>

        <div class="section-card">
            <div class="list-header-row">
                <div>
                    <div class="section-title" style="margin-bottom:0;">Customer List</div>
                    <div class="total-counter">Total: <strong id="totalCountText">0</strong> customers</div>
                </div>
                <button class="btn-danger-all" id="clearExpiredBtn">🗑 Clear Expired</button>
            </div>

            <input type="text" id="searchBar" class="search-input" placeholder="Search customer by username...">
            <div id="customersContainer"></div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const togglePassBtn = document.getElementById('togglePassBtn');
        const newPassword = document.getElementById('newPassword');
        const createUserForm = document.getElementById('createUserForm');
        const customersContainer = document.getElementById('customersContainer');
        const totalCountText = document.getElementById('totalCountText');
        const searchBar = document.getElementById('searchBar');
        const clearExpiredBtn = document.getElementById('clearExpiredBtn');
        const durationSelect = document.getElementById('durationSelect');
        const inputDays = document.getElementById('inputDays');
        const inputHours = document.getElementById('inputHours');
        const inputMinutes = document.getElementById('inputMinutes');

        togglePassBtn.addEventListener('click', () => {
            const isPass = newPassword.type === 'password';
            newPassword.type = isPass ? 'text' : 'password';
            togglePassBtn.innerHTML = isPass ? '<i data-lucide="eye-off" style="width:16px;"></i>' : '<i data-lucide="eye" style="width:16px;"></i>';
            lucide.createIcons();
        });

        durationSelect.addEventListener('change', () => {
            if(durationSelect.value !== 'custom') {
                inputDays.value = durationSelect.value;
                inputHours.value = 0;
                inputMinutes.value = 0;
            }
        });

        function renderCustomers(filterText = '') {
            fetch('/api/admin/users')
            .then(res => res.json())
            .then(data => {
                if(!data.success) return;
                customersContainer.innerHTML = '';
                
                const filtered = data.users.filter(c => c.username.toLowerCase().includes(filterText.toLowerCase()));
                totalCountText.innerText = filtered.length;

                filtered.forEach(user => {
                    let timeLeftText = "Not activated yet";
                    if (user.startTime) {
                        if (user.isExpired) {
                            timeLeftText = "Expired";
                        } else {
                            const totalSecs = Math.floor(user.msRemaining / 1000);
                            const d = Math.floor(totalSecs / 86400);
                            const h = Math.floor((totalSecs % 86400) / 3600);
                            const m = Math.floor((totalSecs % 3600) / 60);
                            timeLeftText = `${d}d ${h}h ${m}m remaining`;
                        }
                    }

                    const card = document.createElement('div');
                    card.className = 'customer-item';
                    card.innerHTML = `
                        <div class="item-top-row">
                            <div class="customer-name">
                                <span class="status-dot ${user.isOnline ? 'online' : 'offline'}"></span>
                                ${user.username} <span class="status-lbl-text">(${user.isOnline ? 'Online' : 'Offline'})</span>
                            </div>
                            <div class="badge-active" style="color:${user.isExpired ? '#dc2626' : '#10b981'}">${user.isExpired ? 'Expired' : 'Active'}</div>
                        </div>
                        <div class="customer-details">
                            <strong>Password:</strong> ${user.password}<br>
                            <strong>Created:</strong> ${user.createdDate}<br>
                            <strong>Limit:</strong> ${user.durationLabel}<br>
                            <strong>Time Left:</strong> <span class="${user.isExpired ? 'highlight-expired' : ''}">${timeLeftText}</span>
                        </div>
                        <div class="actions-container">
                            <button class="action-btn btn-row-del" onclick="deleteUser('${user.id}')">Delete</button>
                        </div>
                    `;
                    customersContainer.appendChild(card);
                });
                lucide.createIcons();
            });
        }

        createUserForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const days = parseInt(inputDays.value) || 0;
            const hours = parseInt(inputHours.value) || 0;
            const minutes = parseInt(inputMinutes.value) || 0;
            const totalMs = ((days * 24 * 60) + (hours * 60) + minutes) * 60 * 1000;

            if (totalMs <= 0) {
                alert("Please select a valid duration!");
                return;
            }

            fetch('/api/admin/create', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: document.getElementById('newUsername').value.trim(),
                    password: newPassword.value,
                    durationMs: totalMs,
                    durationLabel: `${days}d ${hours}h ${minutes}m`
                })
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    renderCustomers(searchBar.value);
                    createUserForm.reset();
                    durationSelect.value = '1';
                } else {
                    alert(data.message);
                }
            });
        });

        window.deleteUser = function(id) {
            if(!confirm("Are you sure you want to delete this user?")) return;
            fetch(`/api/admin/delete/${id}`, { method: 'DELETE' })
            .then(() => renderCustomers(searchBar.value));
        };

        clearExpiredBtn.addEventListener('click', () => {
            fetch('/api/admin/clear-expired', { method: 'POST' })
            .then(() => renderCustomers(searchBar.value));
        });

        searchBar.addEventListener('input', () => renderCustomers(searchBar.value));
        setInterval(() => renderCustomers(searchBar.value), 10000);
        renderCustomers();
    </script>
</body>
</html>
